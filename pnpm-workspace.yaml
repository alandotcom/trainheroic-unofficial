packages:
  - "packages/*"

# Force the dev-only changesets transitive js-yaml@3.x to the patched release
# (GHSA-h67p-54hq-rp68, quadratic-complexity DoS in merge-key handling). Scoped to
# the 3.x range so Astro's js-yaml@4.x is left alone.
overrides:
  js-yaml@3: "^3.15.0"

# pnpm 11 build-script policy (replaces package.json's "pnpm.onlyBuiltDependencies").
# Every dependency with an install script needs an explicit decision, or pnpm fails the
# deps-status check with ERR_PNPM_IGNORED_BUILDS. Only the toolchain binaries we actually
# use are allowed to build; the rest are intentionally not built.
allowBuilds:
  esbuild: true
  workerd: true
  "@mongodb-js/zstd": false
  core-js-pure: false
  node-liblzma: false
  sharp: false

minimumReleaseAgeExclude:
  - '@astrojs/compiler-binding-darwin-arm64@0.3.0'
  - '@astrojs/compiler-binding-darwin-x64@0.3.0'
  - '@astrojs/compiler-binding-linux-arm64-gnu@0.3.0'
  - '@astrojs/compiler-binding-linux-arm64-musl@0.3.0'
  - '@astrojs/compiler-binding-linux-x64-gnu@0.3.0'
  - '@astrojs/compiler-binding-linux-x64-musl@0.3.0'
  - '@astrojs/compiler-binding-wasm32-wasi@0.3.0'
  - '@astrojs/compiler-binding-win32-arm64-msvc@0.3.0'
  - '@astrojs/compiler-binding-win32-x64-msvc@0.3.0'
  - '@astrojs/compiler-binding@0.3.0'
  - '@astrojs/compiler-rs@0.3.0'
  - astro@7.0.4
