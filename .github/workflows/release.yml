name: Release

# Changesets-native release flow. Changesets accumulate as .changeset/*.md on main (every commit
# carries one). On each push to main this workflow runs changesets/action, which maintains a
# "Version Packages" PR: it applies the pending changesets on a side branch (changeset-release/main),
# bumping the fixed-group version, writing CHANGELOGs, and deleting the consumed changesets, then
# opens/updates a PR. You release by MERGING that PR.
#
# Why this instead of the old "version + push straight to main" script: merging a PR is an ordinary
# update to main that satisfies the branch ruleset's required `check`, so nothing has to bypass
# branch protection. The bot only ever pushes to the side branch and the release tag (tags are not
# ruleset-protected) — never to main.
#
# When the Version PR merges, main carries the bumped versions but no pending changesets and no tag
# yet. The gate step detects that (no changesets + the current version has no tag) and treats it as
# a release: it runs the full check, tags vX.Y.Z, creates the GitHub release (commit-log notes),
# deploys the worker at the tag, then dispatches publish.yml for the npm publish.
#
# publish.yml stays the publisher, so npm's OIDC trusted-publisher binding (tied to its file path)
# is preserved — no npm reconfiguration. The publish hand-off is a workflow_dispatch, the documented
# exception to GITHUB_TOKEN not triggering further workflows.

on:
  push:
    branches: [main]
  workflow_dispatch: # manual re-trigger of the version-PR / release-detection pass

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version-PR branch and the release tag
  pull-requests: write # open/update the Version Packages PR

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.gate.outputs.released }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so tag listing and commit-log release notes work.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Maintain the Version Packages PR when changesets are pending. No `publish` command: the npm
      # publish is handled by publish.yml (below) to keep its OIDC trust binding intact. `version`
      # runs `changeset version` (bumps the fixed group, writes CHANGELOGs, deletes the changesets).
      - name: Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A push to main with no pending changesets is a release iff the current version has no tag
      # yet — i.e. the Version PR was just merged. Any other push (changesets still pending, or the
      # version already tagged) is a no-op and the deploy/publish jobs are skipped.
      - name: Detect release
        id: gate
        run: |
          if [ "${{ steps.changesets.outputs.hasChangesets }}" = "true" ]; then
            echo "Version PR created/updated; not a release commit."
            echo "released=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          version=$(node -p "require('./packages/core/package.json').version")
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "v$version already tagged; nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Releasing v$version"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Gate the release on the same checks CI runs, so a red main can never be tagged or published.
      - name: Generate Cloudflare types
        if: steps.gate.outputs.released == 'true'
        run: pnpm --filter @trainheroic-unofficial/cloudflare cf-typegen

      - name: Check
        if: steps.gate.outputs.released == 'true'
        run: pnpm run check

      - name: Tag and GitHub release
        if: steps.gate.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
        run: |
          version="${{ steps.gate.outputs.version }}"
          tag="v$version"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          # Notes from the commit log since the previous tag (no PRs to summarize); drop the
          # chore(release) bump commits.
          prev="$(git tag --sort=-version:refname | grep -vFx "$tag" | head -n1 || true)"
          if [ -n "$prev" ]; then range="$prev..$tag"; else range="$tag"; fi
          {
            echo "## What's changed"
            echo
            git log --no-merges --pretty='- %s' "$range" | grep -vE '^- chore\(release\):' || echo "- Initial release"
            echo
            if [ -n "$prev" ]; then
              echo "**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
            else
              echo "**Full Changelog**: https://github.com/$repo/commits/$tag"
            fi
          } > /tmp/relnotes.md
          gh release create "$tag" --title "$tag" --notes-file /tmp/relnotes.md --latest

  # Migrate + deploy the worker at the release tag, before publishing, so the hosted worker and the
  # published SDK/CLI match. Only runs on an actual release.
  deploy:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: v${{ needs.release.outputs.version }}
    secrets: inherit

  # Hand off to publish.yml against the new tag, after the worker deploy succeeds. publish.yml checks
  # out the tag, builds, and runs `changeset publish` (idempotent; skips versions already on the
  # registry; excludes the private worker), authenticated by npm OIDC trusted publishing.
  publish:
    needs: [release, deploy]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write # dispatch publish.yml (workflow_dispatch)
    steps:
      - name: Dispatch publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run publish.yml --ref "v${{ needs.release.outputs.version }}"
