name: Deploy website

# Build the static site and publish to GitHub Pages on pushes to main and manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @trainheroic-unofficial/website run build
        env:
          # Project Pages URL: https://alandotcom.github.io/trainheroic-unofficial/
          ASTRO_BASE: /trainheroic-unofficial/
          ASTRO_SITE: https://alandotcom.github.io/trainheroic-unofficial

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
