name: CI

# Formatting, linting, type checking, tests, and build for the whole pnpm
# workspace. Runs on every push to main and on every pull request.

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run fmt:check

      - name: Lint
        run: pnpm run lint

      - name: Generate Cloudflare types
        run: pnpm --filter @trainheroic-unofficial/cloudflare cf-typegen

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
