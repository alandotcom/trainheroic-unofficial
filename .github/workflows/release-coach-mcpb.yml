name: Release Coach MCPB

# Builds, signs, and publishes the local server as a Claude Desktop extension (.mcpb) so
# end users download a prebuilt file instead of building it. Push a tag like
# `coach-mcp-v0.1.0` to cut a release; or run manually (workflow_dispatch) to produce a
# downloadable build artifact without a release.

on:
  push:
    tags: ["coach-mcp-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcp/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build and pack the MCPB
        run: pnpm --filter @trainheroic-unofficial/coach-mcp build:mcpb

      - name: Sign and verify
        working-directory: mcp/packages/local
        env:
          # Optional: set these repo secrets to a real code-signing cert for a verified
          # publisher. Without them the bundle is self-signed (installable; Desktop shows it
          # as an unverified publisher).
          MCPB_CERT: ${{ secrets.MCPB_CERT }}
          MCPB_KEY: ${{ secrets.MCPB_KEY }}
        run: |
          if [ -n "$MCPB_CERT" ] && [ -n "$MCPB_KEY" ]; then
            printf '%s' "$MCPB_CERT" > cert.pem
            printf '%s' "$MCPB_KEY" > key.pem
            pnpm exec mcpb sign dist/trainheroic-coach-mcp.mcpb -c cert.pem -k key.pem
            rm -f cert.pem key.pem
          else
            echo "No MCPB_CERT/MCPB_KEY secrets set; creating a self-signed signature."
            pnpm exec mcpb sign dist/trainheroic-coach-mcp.mcpb --self-signed
          fi
          pnpm exec mcpb verify dist/trainheroic-coach-mcp.mcpb

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trainheroic-coach-mcp
          path: mcp/packages/local/dist/trainheroic-coach-mcp.mcpb
          if-no-files-found: error

      - name: Attach to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mcp/packages/local/dist/trainheroic-coach-mcp.mcpb
          fail_on_unmatched_files: true
