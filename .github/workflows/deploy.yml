name: Deploy

# Deploy the hosted Cloudflare Worker. This runs only as part of a release: release.yml calls
# it (workflow_call) against the release tag, after versioning, so the worker updates in lockstep
# with the published packages instead of on every push to main. It is also runnable on its own
# (workflow_dispatch) for an emergency redeploy of a specific commit or tag.

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to deploy (the release tag).'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (commit SHA or tag). Defaults to the ref the run was dispatched on.'
        type: string
        required: false

# Never run two deploys at once; let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The release tag when called by release.yml, an explicit ref when dispatched manually,
          # otherwise whatever ref the dispatch ran on.
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Apply remote D1 migrations before the new code goes live, so the Worker never queries
      # a table that does not exist yet. migrations/ is append-only and idempotent, so this is
      # a no-op when nothing is pending.
      - name: Apply remote D1 migrations
        run: pnpm --filter @trainheroic-unofficial/cloudflare run db:migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # scripts/deploy.sh: wrangler deploy (+ Cloudflare source maps), then upload source maps
      # to Sentry when SENTRY_AUTH_TOKEN is set. Without the token the Sentry step is skipped
      # and the deploy still succeeds. SENTRY_RELEASE defaults to the short git sha.
      - name: Deploy worker
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
